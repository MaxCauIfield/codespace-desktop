version: '3.8'

services:
  desktop:
    image: dorowu/ubuntu-desktop-lxde-vnc
    container_name: cloudshell-desktop
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
      - "0.0.0.0:5900:5900"
    volumes:
      - $HOME:/root
    environment:
      - RESOLUTION=1280x720
      - VNC_PASSWORD=${VNC_PASSWORD:-password}
      - USER=root
